name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r dev-requirements.txt

      - name: Check app.py parses without errors
        run: python -m py_compile app.py

      - name: Import app.py (catches broken imports and missing dependencies)
        run: python -c "import app"

      - name: Import all utils modules
        run: |
          python -c "import utils.data_processing"
          python -c "import utils.scoring"
          python -c "import utils.recommendations"
          python -c "import utils.exports"
          python -c "import utils.integrations"

      - name: Run tests
        run: pytest tests/ -v
