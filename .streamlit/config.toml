[server]
headless = true
address = "0.0.0.0"
port = 5000
enableCORS = false

# enableXsrfProtection is false because this app runs inside Replit's proxied
# iframe, which strips the XSRF cookie headers Streamlit expects.
# If you deploy outside Replit (Streamlit Community Cloud, VPS, Docker, etc.)
# set this back to true for proper CSRF protection.
enableXsrfProtection = false

[theme]
base = "dark"
primaryColor = "#4F8EF7"
backgroundColor = "#0E1117"
secondaryBackgroundColor = "#161B27"
textColor = "#FAFAFA"
